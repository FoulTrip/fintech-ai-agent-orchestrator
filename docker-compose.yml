services:
  backend:
    build:
      context: ./backend
    container_name: fintech_backend
    environment:
      USE_MOCK_IA: ${USE_MOCK_IA:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-mongodb://localhost:27017/fintech}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: fintech_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
